<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:,">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">
        <span class="brand-mark" aria-hidden="true">✦</span>
        <span class="brand-name">{{ site.title }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/00-index.html' | relative_url }}">Full Index</a>
        <a href="{{ site.github.repository_url | default: 'https://github.com/eskyuji/hsr-compendium' }}">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="wrap content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>A fan-made compendium for <em>Honkai: Star Rail</em>. Not affiliated with HoYoverse. &middot; <a href="{{ site.github.repository_url | default: 'https://github.com/eskyuji/hsr-compendium' }}">View source on GitHub</a></p>
    </div>
  </footer>
</body>
</html>
